<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Samantha Kobiiiiiiii</title>
  <style>
    :root {
      --bg1: #fff3f8;
      --bg2: #ffe7f1;
      --bg3: #fbefff;
      --card: rgba(255, 255, 255, 0.68);
      --text: #7a3657;
      --muted: #9e6c86;
      --accent: #ff84b7;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(214, 113, 162, 0.18);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 181, 214, 0.9), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 225, 168, 0.6), transparent 25%),
        radial-gradient(circle at bottom right, rgba(214, 179, 255, 0.55), transparent 28%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 52%, var(--bg3));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "🌸 ✿ 🌷 ❀ 🌼 ✿ 🌸";
      position: fixed;
      left: 0;
      width: 100%;
      font-size: clamp(20px, 2vw, 28px);
      letter-spacing: 18px;
      opacity: 0.28;
      pointer-events: none;
      white-space: nowrap;
      text-align: center;
      z-index: 0;
    }

    body::before { top: 16px; }
    body::after { bottom: 16px; }

    .floating-flowers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      font-size: clamp(22px, 3vw, 40px);
      opacity: 0.18;
      animation: floaty 9s ease-in-out infinite;
    }

    .flower:nth-child(1) { top: 8%; left: 5%; animation-delay: 0s; }
    .flower:nth-child(2) { top: 18%; right: 8%; animation-delay: 1.2s; }
    .flower:nth-child(3) { top: 48%; left: 4%; animation-delay: 2.4s; }
    .flower:nth-child(4) { top: 65%; right: 6%; animation-delay: 1.8s; }
    .flower:nth-child(5) { bottom: 12%; left: 10%; animation-delay: 0.8s; }
    .flower:nth-child(6) { bottom: 18%; right: 14%; animation-delay: 2.8s; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-14px) rotate(6deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1.05fr;
      gap: 28px;
      align-items: stretch;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .photo-card {
      overflow: hidden;
      min-height: 620px;
      position: relative;
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 24px;
      border: 2px dashed rgba(255, 160, 201, 0.45);
      pointer-events: none;
      z-index: 2;
    }

    .slideshow {
      position: relative;
      min-height: 620px;
      overflow: hidden;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,0.45), rgba(255,255,255,0.15));
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(255, 192, 222, 0.14), rgba(255,255,255,0.04));
    }

    .dots {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 3;
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.15);
    }

    .countdown-card {
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 620px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 0;
      box-shadow: none;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(36px, 5vw, 64px);
      line-height: 1.05;
      color: #7a3153;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 8px;
    }

    .time-box {
      padding: 22px 14px;
      text-align: center;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 12px 24px rgba(214, 113, 162, 0.1);
    }

    .time-value {
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
      color: #cc5f99;
    }

    .time-label {
      font-size: 13px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
      .photo-card, .countdown-card, .slideshow { min-height: 420px; }
    }

    @media (max-width: 620px) {
      .countdown-card { padding: 0; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 42px; }
    }
  </style>
</head>
<body>
  <div class="floating-flowers" aria-hidden="true">
    <span class="flower">🌸</span>
    <span class="flower">🌷</span>
    <span class="flower">❀</span>
    <span class="flower">🌼</span>
    <span class="flower">✿</span>
    <span class="flower">🌺</span>
  </div>

  <main class="container">
    <section class="card photo-card">
      <div class="slideshow">
        <div class="slide active" style="background-image: url('332aa20f-cb14-4d90-b564-d5b9f80fe4ea.jpg');"></div>
        <div class="slide" style="background-image: url('7ef036d6-f4d3-4b8a-9a68-b886f02f09c9.jpg');"></div>
        <div class="slide" style="background-image: url('85eb6f99-7225-4d3b-9a90-6d818c4312fa.jpg');"></div>
        <div class="slide" style="background-image: url('d0b4b932-3692-4571-80df-a805a846e1c8.jpg');"></div>
        <div class="dots" aria-hidden="true">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </section>

    <section class="countdown-card">
      <h1>Happy Birthday Samantha Kobiiiiiiii</h1>

      <div class="grid">
        <div class="time-box">
          <div class="time-value" id="days">00</div>
          <div class="time-label">Days</div>
        </div>
        <div class="time-box">
          <div class="time-value" id="hours">00</div>
          <div class="time-label">Hours</div>
        </div>
        <div class="time-box">
          <div class="time-value" id="minutes">00</div>
          <div class="time-label">Minutes</div>
        </div>
        <div class="time-box">
          <div class="time-value" id="seconds">00</div>
          <div class="time-label">Seconds</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const targetTime = new Date('2026-04-26T00:00:00+08:00').getTime();
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    let currentSlide = 0;

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function updateCountdown() {
      const now = Date.now();
      const distance = targetTime - now;
      const safeDistance = Math.max(distance, 0);

      const days = Math.floor(safeDistance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((safeDistance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((safeDistance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((safeDistance % (1000 * 60)) / 1000);

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    function showSlide(index) {
      slides.forEach((slide, i) => slide.classList.toggle('active', i === index));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
    setInterval(nextSlide, 5000);
  </script>
</body>
</html>
